# @package _global_
# Local CPU testing config — Qwen2.5-0.5B, 30 steps

dpo:
  beta: 0.1
  loss_type: "sigmoid"
  max_prompt_length: 256
  max_length: 512
  label_smoothing: 0.0

training:
  output_dir: "experiments/dpo_runs/local_test"
  num_train_epochs: 1
  max_steps: 30
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  bf16: false
  fp16: false
  logging_steps: 5
  report_to: "none"
  run_name: "dpo-local-test"
  eval_steps: 15
  save_steps: 30
  save_total_limit: 1
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  dataloader_num_workers: 0
  overfit_threshold: 0.5
  overfit_patience: 5
  seed: 42