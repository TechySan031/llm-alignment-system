# @package *global*

# ─── LoRA Configuration ──────────────────────────────────────────────────

lora:
r: 8
lora_alpha: 16

target_modules:
- "q_proj"
- "v_proj"

lora_dropout: 0.05
bias: "none"
task_type: "CAUSAL_LM"

# ─── DPO-specific parameters ──────────────────────────────────────────────

dpo:
beta: 0.1

loss_type: "sigmoid"

max_prompt_length: 1024

max_length: 2048

label_smoothing: 0.0
