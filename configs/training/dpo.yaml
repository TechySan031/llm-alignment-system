# @package _global_

# ─── DPO-specific parameters ──────────────────────────────────────────────
dpo:
  # β controls the KL divergence penalty between policy and reference.
  # 0.1 is the standard starting point for most alignment tasks.
  # Increase β if the model drifts too far from SFT behaviour.
  # Decrease β if the alignment signal is too weak (loss doesn't move).
  beta: 0.1

  # Loss type: "sigmoid" (standard DPO), "ipo" (more stable), "kto_pair"
  loss_type: "sigmoid"

  # Max tokens for the prompt (system + user turns only, no response)
  max_prompt_length: 1024

  # Max total sequence length (prompt + chosen/rejected)
  max_length: 2048

  # Label smoothing: small value (0.05) can prevent overconfident logits
  label_smoothing: 0.0

# ─── Training parameters ─────────────────────────────────────────────────
training:
  output_dir: "experiments/dpo_runs/run_001"

  # DPO typically needs only 1 epoch on the preference dataset.
  # More epochs often causes reward hacking (model collapses on chosen format).
  num_train_epochs: 1
  max_steps: -1

  # DPO batch size — smaller than SFT because we process pairs (2× sequences)
  # A100 40GB: per_device=2, grad_accum=8  → effective=16 pairs
  # RTX 4090:  per_device=1, grad_accum=16 → effective=16 pairs
  # T4 16GB:   per_device=1, grad_accum=16 → effective=16 pairs
  # CPU (test): per_device=1, grad_accum=1 → effective=1 pair
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8

  # Lower LR than SFT — model is already fine-tuned, apply gentle correction
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0

  bf16: true
  fp16: false

  logging_steps: 10
  report_to: "wandb"
  run_name: "dpo-qwen2.5-7b"
  eval_steps: 50
  save_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

  dataloader_num_workers: 4
  overfit_threshold: 0.4
  overfit_patience: 3
  seed: 42